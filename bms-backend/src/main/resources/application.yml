server:
  port: 8088

spring:
  application:
    name: bms-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bms}
    username: ${DB_USER:bms}
    password: ${DB_PASSWORD:change_me!}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

app:
  jwt:
    secret: ${JWT_SECRET:ChangeThisSecretKeyInProductionEnvironmentPleaseMakeItLongEnough}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24h
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

  # Seed a default admin user if none exists (see DataSeeder)
  seed:
    admin-username: ${SEED_ADMIN_USERNAME:admin}
    admin-password: ${SEED_ADMIN_PASSWORD:Admin@12345}

logging:
  level:
    com.firom.bms: INFO
    org.springframework.security: WARN
